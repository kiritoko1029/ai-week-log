name: Release

# 推送 v* 形式的 tag（即发布版本）时触发
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 上传构建产物到 GitHub Release 需要

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false # 一个平台失败不取消另一个
      matrix:
        include:
          # Windows x64：NSIS（.exe 安装器）+ MSI
          - os: windows-latest
            bundles: nsis,msi
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          # macOS arm64：dmg（macos-14 为 Apple Silicon）
          - os: macos-14
            bundles: app,dmg
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        # package.json 已声明 packageManager: pnpm@11.6.0，无需指定 version
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # 渲染层 Vite 打包需要 Node（beforeBuildCommand 会用到 pnpm）
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        # Tauri 2 要求 Rust ≥ 1.77.2；各 runner 均为原生目标（win x64 / mac arm64），无需额外 target
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## 更新内容"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_tag}" --no-merges
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              git log --pretty=format:'- %s (%h)' "${current_tag}" --no-merges
            fi
          } > RELEASE_NOTES.md

      - name: Import macOS signing certificate
        # 仅 macOS：把自签名「WeekLog Dev」.p12 导入 runner 的「默认登录钥匙串」。
        #
        # 为什么手动导入而非依赖 tauri 的 APPLE_CERTIFICATE 自动导入？
        # tauri-macos-sign 的 with_certificate() 路径会创建临时钥匙串，再用 identity::list()
        # 解析签名身份——而该函数**硬编码只接受 Apple Developer 证书前缀**
        #（Developer ID Application: / Apple Development: 等）。我们的自签名「WeekLog Dev」
        # 不匹配任何前缀 → ResolveSigningIdentity 失败。
        # 改走另一条路：导入到默认钥匙串 + 只设 APPLE_SIGNING_IDENTITY，tauri 会用
        # with_signing_identity()（按 CN 直接签名，不过滤前缀），与本机 tauri-build-signed.sh 一致。
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "未配置 APPLE_CERTIFICATE secret，跳过签名（ad-hoc）。"
            exit 0
          fi
          KEYCHAIN="$RUNNER_USERPASS_KEYCHAIN"
          # GitHub macOS runner 的默认登录钥匙串路径
          : "${KEYCHAIN:=$HOME/Library/Keychains/login.keychain-db}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          # 导入并授权 codesign 免密使用该身份（-A 等价 set-key-partition-list 的宽松授权）
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -A || true
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" 1>/dev/null 2>&1 || true
          rm -f /tmp/cert.p12
          echo "✓ 已导入签名身份："
          security find-identity -p codesigning "$KEYCHAIN" | grep "WeekLog Dev" || true

      - name: Build & package app (Tauri 2)
        # tauri build 自动执行 beforeBuildCommand（pnpm build:renderer:tauri 打包渲染层），
        # 再编译 Rust 后端并打包。产物落在 src-tauri/target/release/bundle/。
        env:
          # macOS：只设 APPLE_SIGNING_IDENTITY（不设 APPLE_CERTIFICATE），强制 tauri 走
          # with_signing_identity() 路径——用上一步导入到默认钥匙串的身份按 CN 签名。
          # 与 tauri.conf.json > bundle.macOS.signingIdentity 的 "WeekLog Dev" 必须一致。
          # 证书未导入时（无 secret）此项仍为 "WeekLog Dev"，但 tauri 找不到身份会自动回退 ad-hoc。
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && 'WeekLog Dev' || '' }}
        shell: bash
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: weeklog-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
          body_path: RELEASE_NOTES.md
