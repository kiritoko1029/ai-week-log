name: Release

# 推送 v* 形式的 tag（即发布版本）时触发
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 上传构建产物到 GitHub Release 需要

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false # 一个平台失败不取消另一个
      matrix:
        include:
          # Windows x64：NSIS（.exe 安装器）+ MSI
          - os: windows-latest
            bundles: nsis,msi
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          # macOS arm64：dmg（macos-14 为 Apple Silicon）
          - os: macos-14
            bundles: app,dmg
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        # package.json 已声明 packageManager: pnpm@11.6.0，无需指定 version
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # 渲染层 Vite 打包需要 Node（beforeBuildCommand 会用到 pnpm）
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        # Tauri 2 要求 Rust ≥ 1.77.2；各 runner 均为原生目标（win x64 / mac arm64），无需额外 target
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## 更新内容"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_tag}" --no-merges
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              git log --pretty=format:'- %s (%h)' "${current_tag}" --no-merges
            fi
          } > RELEASE_NOTES.md

      - name: Import macOS signing certificate
        # 仅 macOS：创建「专用构建钥匙串」导入自签名「WeekLog Dev」.p12。
        #
        # 背景：tauri-macos-sign 的 with_certificate()（APPLE_CERTIFICATE 路径）用
        # identity::list() 解析身份，该函数**硬编码只认 Apple Developer 证书前缀**，
        # 自签名 WeekLog Dev 不匹配 → ResolveSigningIdentity 失败。所以这里手动导入，
        # 只设 APPLE_SIGNING_IDENTITY，让 tauri 走 with_signing_identity()（按 CN 签名、不过滤）。
        #
        # 为什么创建「专用钥匙串」而非用 runner 默认 login.keychain-db？
        # codesign 读私钥时若钥匙串锁定会弹密码框，CI 无 TTY → **永久挂起**（tauri-action #941）。
        # 专用钥匙串可精确控制：设密码、设为默认、autolock 关到 6h、显式解锁、授权 codesign 免密、
        # 置于搜索路径最前。这套序列是 macOS CI 签名的标准做法（见 tauri-action #941 / SO #70991268）。
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "未配置 APPLE_CERTIFICATE secret，跳过签名（ad-hoc）。"
            exit 0
          fi
          # 随机钥匙串密码（仅本 job 生命周期内有效）
          KC_PASS="$(openssl rand -hex 16)"
          KC_PATH="$HOME/Library/Keychains/build.keychain-db"

          # 1. 创建专用钥匙串（已存在则先删，保证幂等）
          security delete-keychain "$KC_PATH" 2>/dev/null || true
          security create-keychain -p "$KC_PASS" "$KC_PATH"
          # 2. autolock 关闭到 6 小时，确保构建期间不锁；并立即解锁
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KC_PASS" "$KC_PATH"
          # 3. 导入 .p12，-T 授权 codesign 免密、-A 允许本机工具
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KC_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -A
          rm -f /tmp/cert.p12
          # 4. partition-list：把私钥授权给 codesign 等（CI 无交互的关键）
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC_PATH"
          # 5. 置于搜索路径最前 + 设为默认，使 tauri/codesign 能解析到该身份
          security list-keychains -d user -s "$KC_PATH" login.keychain-db
          security default-keychain -s "$KC_PATH"

          echo "✓ 已导入签名身份："
          security find-identity -p codesigning "$KC_PATH" | grep "WeekLog Dev"

      - name: Build & package app (Tauri 2)
        # tauri build 自动执行 beforeBuildCommand（pnpm build:renderer:tauri 打包渲染层），
        # 再编译 Rust 后端并打包。产物落在 src-tauri/target/release/bundle/。
        env:
          # macOS：只设 APPLE_SIGNING_IDENTITY（不设 APPLE_CERTIFICATE），强制 tauri 走
          # with_signing_identity() 路径——用上一步导入到默认钥匙串的身份按 CN 签名。
          # 与 tauri.conf.json > bundle.macOS.signingIdentity 的 "WeekLog Dev" 必须一致。
          # 证书未导入时（无 secret）此项仍为 "WeekLog Dev"，但 tauri 找不到身份会自动回退 ad-hoc。
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && 'WeekLog Dev' || '' }}
        shell: bash
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: weeklog-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
          body_path: RELEASE_NOTES.md
          # tag 含预发布标记（-beta / -rc / -alpha 等）时自动标记为 Pre-release
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
