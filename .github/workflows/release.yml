name: Release

# 推送 v* 形式的 tag（即发布版本）时触发
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 上传构建产物到 GitHub Release 需要

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false # 一个平台失败不取消另一个
      matrix:
        include:
          # Windows x64：NSIS（.exe 安装器）+ MSI
          - os: windows-latest
            bundles: nsis,msi
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          # macOS arm64：dmg（macos-14 为 Apple Silicon）
          - os: macos-14
            bundles: app,dmg
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        # package.json 已声明 packageManager: pnpm@11.6.0，无需指定 version
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # 渲染层 Vite 打包需要 Node（beforeBuildCommand 会用到 pnpm）
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        # Tauri 2 要求 Rust ≥ 1.77.2；各 runner 均为原生目标（win x64 / mac arm64），无需额外 target
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## 更新内容"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_tag}" --no-merges
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              git log --pretty=format:'- %s (%h)' "${current_tag}" --no-merges
            fi
          } > RELEASE_NOTES.md

      - name: Build & package app (Tauri 2)
        # tauri build 自动执行 beforeBuildCommand（pnpm build:renderer:tauri 打包渲染层），
        # 再编译 Rust 后端并打包。产物落在 src-tauri/target/release/bundle/。
        env:
          # macOS 自签名「WeekLog Dev」：从 GitHub Secrets 注入一份固定的 .p12，使每次 CI 产出
          # 签名身份稳定（用户点一次「始终允许」即长期生效，钥匙串不再反复弹密码）。
          # 见 docs/signing-macos.md「CI」一节，首次需在本机生成证书并导出：
          #   APPLE_CERTIFICATE          = base64 < WeekLog-Dev.p12
          #   APPLE_CERTIFICATE_PASSWORD = 导出 p12 时设置的密码
          # tauri-cli 读取这两个变量后自动导入临时钥匙串，并用 APPLE_SIGNING_IDENTITY 签名（不公证）。
          # tauri.conf.json > bundle.macOS.signingIdentity 已硬编码为 "WeekLog Dev"，身份须与之匹配。
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-14' && 'WeekLog Dev' || '' }}
        shell: bash
        run: pnpm exec tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: weeklog-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
          body_path: RELEASE_NOTES.md
