name: Release

# 推送 v* 形式的 tag（即发布版本）时触发
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 上传构建产物到 GitHub Release 需要

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false # 一个平台失败不取消另一个
      matrix:
        include:
          # Windows x64：NSIS 安装包
          - os: windows-latest
            dist_script: dist:win
          # macOS arm64：dmg + zip（macos-14 为 Apple Silicon）
          - os: macos-14
            dist_script: dist:mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        # package.json 已声明 packageManager: pnpm@11.6.0，无需指定 version
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # electron 42 要求 Node >= 22.12
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## 更新内容"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_tag}" --no-merges
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              git log --pretty=format:'- %s (%h)' "${current_tag}" --no-merges
            fi
          } > RELEASE_NOTES.md

      - name: Build & package app
        # dist:win / dist:mac 脚本已内含 build:renderer（Vite 打包渲染层）
        # 只打包，不让 electron-builder 创建 GitHub Release；上传统一交给下方 action-gh-release
        run: pnpm run ${{ matrix.dist_script }}

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: weeklog-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*-mac.zip
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*-mac.zip
            release/latest*.yml
          fail_on_unmatched_files: false
          body_path: RELEASE_NOTES.md
